framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # Default backend: filesystem. Zero dependencies — works on any host
        # (including Hostinger Cloud Startup, which has no Redis/phpredis).
        app: cache.adapter.filesystem

        # APCu (not recommended with heavy random-write workloads)
        #app: cache.adapter.apcu

        # Namespaced pools use the above "app" backend by default
        #pools:
            #my.dedicated.cache: null

# Docker/local dev: Redis is available, use it (requires REDIS_URL env var and phpredis).
when@dev:
    framework:
        cache:
            app: cache.adapter.redis
            default_redis_provider: "%env(REDIS_URL)%"

# Tests use in-memory array cache: no Redis dependency, no network, no pollution.
when@test:
    framework:
        cache:
            app: cache.adapter.array
