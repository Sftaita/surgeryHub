# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

parameters:
    app.profile_picture.upload_dir: "%kernel.project_dir%/public/uploads/profile-pictures"
    app.profile_picture.public_base_path: "/uploads/profile-pictures"
    app.hospital_photo.upload_dir: "%kernel.project_dir%/public/uploads/hospital-photos"
    app.hospital_photo.public_base_path: "/uploads/hospital-photos"
    app.vapid.public_key: "%env(VAPID_PUBLIC_KEY)%"
    app.vapid.private_key: "%env(VAPID_PRIVATE_KEY)%"
    app.vapid.subject: "%env(VAPID_SUBJECT)%"

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: "../src/"
        exclude:
            - "../src/DependencyInjection/"
            - "../src/Entity/"
            - "../src/Kernel.php"

    App\Controller\Api\PushSubscriptionController:
        arguments:
            $vapidPublicKey: "%app.vapid.public_key%"
        tags: ['controller.service_arguments']

    App\Service\WebPushService:
        arguments:
            $vapidPublicKey: "%app.vapid.public_key%"
            $vapidPrivateKey: "%app.vapid.private_key%"
            $vapidSubject: "%app.vapid.subject%"

    App\EventListener\AuthenticationSuccessListener:
        tags:
            - name: kernel.event_listener
              event: lexik_jwt_authentication.on_authentication_success
              method: onAuthenticationSuccess

    App\Command\CreateDevUserCommand:
        arguments:
            $appEnv: "%kernel.environment%"

    App\EventListener\MailSafeModeListener:
        arguments:
            $kernelEnvironment: "%kernel.environment%"
            $mailSafeMode: "%env(MAIL_SAFE_MODE)%"
            $allowedDomainsRaw: "%env(MAIL_SAFE_ALLOWED_DOMAINS)%"
            $allowedRecipientsRaw: "%env(MAIL_SAFE_ALLOWED_RECIPIENTS)%"
            $mailerDsn: "%env(MAILER_DSN)%"
            $deliveryModeRaw: "%env(MAIL_SAFE_DELIVERY_MODE)%"
            $localSinksRaw: "%env(MAIL_SAFE_LOCAL_SINKS)%"
