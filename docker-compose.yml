services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/backend          # source code — bind mount (editable from host)
      - vendor_data:/var/www/backend/vendor  # vendor/ in Docker FS — avoids Windows NTFS slowness
      - composer_cache:/tmp/composer-cache   # Composer download cache across rebuilds
    environment:
      # Pointe vers MySQL WAMP (hôte, port 3306) — pas le MySQL Docker
      DATABASE_URL: mysql://root:@host.docker.internal:3306/surgicalhub?serverVersion=8.0.32&charset=utf8mb4
      MAILER_DSN: smtp://mailer:1025
      REDIS_URL: redis://redis:6379
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks: [surgicalhub]

  messenger:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    # memory_limit raised from PHP's 128M default — DomPDF generation for planning
    # deploys (instrumentist/surgeon/global PDFs, batched per mission) OOM-crashed the
    # worker at 128M for ~10+ missions. A fatal "allowed memory size exhausted" is not
    # catchable in PHP, so the handler's own try/catch never runs and the deployment is
    # left stuck on PROCESSING (see PlanningDeploymentReconcileStuckCommand for the
    # recovery side of this fix). Scoped to the messenger service only — the php-fpm
    # web service keeps the default limit.
    command: php -d memory_limit=512M bin/console messenger:consume async --limit=50 -vv
    volumes:
      - ./backend:/var/www/backend          # source code — bind mount
      - vendor_data:/var/www/backend/vendor  # shared with php service — same vendor volume
      - composer_cache:/tmp/composer-cache   # same cache — avoids duplicate downloads
    environment:
      # Pointe vers MySQL WAMP (hôte, port 3306) — pas le MySQL Docker
      DATABASE_URL: mysql://root:@host.docker.internal:3306/surgicalhub?serverVersion=8.0.32&charset=utf8mb4
      MAILER_DSN: smtp://mailer:1025
      REDIS_URL: redis://redis:6379
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      SKIP_COMPOSER_INSTALL: "1"   # php est responsable du composer install — messenger attend vendor_data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      php:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [surgicalhub]

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend:ro        # read-only: serves public/ assets only
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php]
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks: [surgicalhub]

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: surgicalhub
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [surgicalhub]

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # Exposé pour debug hôte (redis-cli, RedisInsight, TablePlus…)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [surgicalhub]

  mailer:
    image: axllent/mailpit
    ports:
      - "1026:1025"   # SMTP — utilisé par php/messenger via smtp://mailer:1025
      - "8026:8025"   # Web UI  — http://localhost:8026
    networks: [surgicalhub]

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    profiles: [tools]   # n'est PAS démarré par "docker compose up -d" — voir `make tools-up`
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"   # Web UI — http://localhost:8081  (login: root / root)
    networks: [surgicalhub]

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                        # source code — bind mount (hot reload)
      - node_modules_data:/app/node_modules    # node_modules in Docker FS — avoids Windows NTFS slowness
      - npm_cache:/root/.npm                   # NPM download cache across rebuilds
    environment:
      BACKEND_URL: http://nginx
      npm_config_cache: /root/.npm
    networks: [surgicalhub]

volumes:
  mysql_data:
  redis_data:
  vendor_data:
  node_modules_data:
  composer_cache:
  npm_cache:

networks:
  surgicalhub:
    driver: bridge
