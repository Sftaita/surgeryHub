<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/surgery-hub-design-system-d9910452-cae4-4658-bd1e-a9360bed9e01/tokens/fonts.css">
<link rel="stylesheet" href="_ds/surgery-hub-design-system-d9910452-cae4-4658-bd1e-a9360bed9e01/tokens/colors.css">
<link rel="stylesheet" href="_ds/surgery-hub-design-system-d9910452-cae4-4658-bd1e-a9360bed9e01/tokens/effects.css">
<style>html,body{margin:0;padding:0}body{font-family:var(--font-sans)}</style>
</helmet>
<div style="display:flex;align-items:center;gap:12px;width:100%">
  <span style="width:74px;flex:none;font-size:13px;font-weight:700;color:var(--gray-700)">{{ label }}</span>
  <button onClick="{{ onMinus }}" aria-label="Diminuer" style="width:46px;height:46px;border:1.5px solid var(--border-default);border-radius:12px;background:#fff;color:var(--gray-700);font-size:19px;font-weight:700;cursor:pointer;font-family:inherit;flex:none" style-hover="border-color:var(--green-500);color:var(--green-700)" style-active="transform:scale(.96)">−</button>
  <span style="flex:1;text-align:center;font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text-strong)">{{ value }}</span>
  <button onClick="{{ onPlus }}" aria-label="Augmenter" style="width:46px;height:46px;border:1.5px solid var(--border-default);border-radius:12px;background:#fff;color:var(--gray-700);font-size:19px;font-weight:700;cursor:pointer;font-family:inherit;flex:none" style-hover="border-color:var(--green-500);color:var(--green-700)" style-active="transform:scale(.96)">+</button>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 420, &quot;height&quot;: 90 },
  &quot;label&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Début&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;value&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;07h30&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;onMinus&quot;: { &quot;editor&quot;: null, &quot;tsType&quot;: &quot;() =&gt; void&quot; },
  &quot;onPlus&quot;: { &quot;editor&quot;: null, &quot;tsType&quot;: &quot;() =&gt; void&quot; }
}"></script>
</body>
</html>
